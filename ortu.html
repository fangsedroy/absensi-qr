<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pantau Presensi Siswa</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body { 
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 20px; 
        }
        
        .container { 
            background: #ffffff; 
            max-width: 450px; 
            width: 100%; 
            padding: 40px 30px; 
            border-radius: 30px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.25); 
            text-align: center; 
        }

        .school-icon {
            font-size: 50px;
            margin-bottom: 15px;
            display: inline-block;
        }
        
        h2 { 
            color: #1e3a8a; 
            font-size: 26px; 
            font-weight: 700; 
            margin-bottom: 12px; 
        }
        
        .subtitle { 
            color: #64748b; 
            font-size: 14px; 
            line-height: 1.6;
            margin-bottom: 30px; 
        }

        .form-group {
            margin-bottom: 20px;
        }
        
        input[type="text"] {
            width: 100%;
            padding: 16px 20px;
            border-radius: 16px;
            border: 2px solid #e2e8f0;
            font-size: 16px;
            font-weight: 600;
            text-align: center;
            color: #334155;
            outline: none;
            text-transform: uppercase;
            transition: all 0.3s ease;
            background-color: #f8fafc;
        }

        input[type="text"]:focus {
            border-color: #3b82f6;
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
        }
        
        .btn-search {
            width: 100%;
            background: #2563eb;
            color: white;
            border: none;
            padding: 16px 20px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 16px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2);
            transition: all 0.2s ease;
        }
        
        .btn-search:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(37, 99, 235, 0.3);
        }

        .btn-search:active {
            transform: translateY(0);
        }

        /* Tampilan Kotak Hasil */
        #resultBox {
            margin-top: 30px;
        }
        
        .card-result {
            background-color: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            padding: 25px 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            text-align: left;
            animation: slideUp 0.4s ease;
        }
        
        .badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .badge-success {
            background-color: #dcfce7;
            color: #166534;
        }

        .badge-danger {
            background-color: #fee2e2;
            color: #991b1b;
        }

        .student-name {
            font-size: 22px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 4px;
            text-transform: uppercase;
        }
        
        .student-name::first-letter {
            text-transform: uppercase;
        }

        .student-class {
            font-size: 15px;
            color: #475569;
            font-weight: 600;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .info-time {
            border-top: 1px dashed #e2e8f0;
            padding-top: 15px;
            color: #64748b;
            font-size: 14px;
            line-height: 1.5;
        }

        .info-time b {
            color: #0f172a;
            font-size: 15px;
        }
        
        .alert { 
            padding: 15px 20px; 
            border-radius: 16px; 
            font-size: 14px;
            font-weight: 600;
            line-height: 1.5;
            animation: slideUp 0.4s ease; 
        }
        
        .alert-loading { 
            background-color: #f8fafc; 
            color: #475569; 
            border: 1px solid #e2e8f0;
        }
        
        .alert-error { 
            background-color: #fef2f2; 
            color: #991b1b; 
            border: 1px solid #fca5a5; 
            text-align: center;
        }
        
        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(15px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
    </style>
</head>
<body>

<div class="container">
    <span class="school-icon">🏫</span>
    <h2>Pantau Presensi</h2>
    <p class="subtitle">Ketik nama lengkap anak Anda untuk memvalidasi status kehadiran di sekolah hari ini.</p>
    
    <div class="form-group">
        <input type="text" id="inputNama" placeholder="CONTOH: BUDI SANTOSO" autocomplete="off">
    </div>
    
    <button class="btn-search" onclick="periksaKehadiran()">Periksa Kehadiran</button>

    <div id="resultBox"></div>
</div>

<script>
    // ⚠️ PASTEKAN URL WEB APP EXEC APPS SCRIPT BARU KAMU DI SINI
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyMWpvcU8HLBGWieswM9hjXWYjYhbDELRtOWtjGnKmhn1ZHO10QcMenpw-hOXY5Wrme1A/exec"; 

    function periksaKehadiran() {
        var namaInput = document.getElementById('inputNama').value.trim();
        var statusBox = document.getElementById('resultBox');
        
        if (namaInput === "") {
            statusBox.innerHTML = `<div class="alert alert-error">⚠️ Silakan masukkan nama anak Anda terlebih dahulu.</div>`;
            return;
        }
        
        statusBox.innerHTML = `<div class="alert alert-loading">⏳ Mencari data log presensi siswa...</div>`;
        
        // Memakai parameter URL murni tanpa memicu proteksi CORS CORS-preflight browser
        var urlFinal = WEB_APP_URL + "?action=checkStatus&nama=" + encodeURIComponent(namaInput);
        
        fetch(urlFinal)
        .then(response => {
            if (!response.ok) {
                throw new Error("Respon jaringan bermasalah");
            }
            return response.json();
        })
        .then(data => {
            if (data.result === "found") {
                // Konfigurasi visual badge status kehadiran siswa
                var isHadir = data.status.toUpperCase() === "SUDAH HADIR" || data.status.toUpperCase() === "HADIR";
                var badgeTxt = isHadir ? "✓ SUDAH HADIR" : "✗ BELUM HADIR";
                var badgeStyle = isHadir ? "badge-success" : "badge-danger";
                
                // 🌟 MENAMPILKAN DATA BESERTA KELAS SISWA SECARA ELEGAN
                statusBox.innerHTML = `
                    <div class="card-result">
                        <span class="badge ${badgeStyle}">${badgeTxt}</span>
                        <h3 class="student-name">${data.nama}</h3>
                        <p class="student-class">📁 Kelas: ${data.kelas}</p> 
                        <div class="info-time">
                            Telah melakukan scan masuk pada pukul:<br>
                            <b>${data.waktu} WIB</b>
                        </div>
                    </div>
                `;
            } else if (data.result === "not_found") {
                statusBox.innerHTML = `
                    <div class="alert alert-error">
                        ❌ <b>Nama tidak ditemukan.</b><br>Periksa kembali ejaan nama lengkap anak Anda.
                    </div>
                `;
            } else {
                statusBox.innerHTML = `<div class="alert alert-error">❌ Terjadi kesalahan pada konfigurasi server sheet.</div>`;
            }
        })
        .catch(error => {
            console.error("Fetch Error:", error);
            statusBox.innerHTML = `
                <div class="alert alert-error">
                    ❌ <b>Koneksi gagal.</b><br>Pastikan URL Web App benar dan opsi izin akses diatur ke 'Anyone'.
                </div>
            `;
        });
    }

    // Mengizinkan pencarian otomatis saat orang tua menekan tombol 'Enter' di keyboard
    document.getElementById('inputNama').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            periksaKehadiran();
        }
    });
</script>

</body>
</html>
