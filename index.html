<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistem Presensi Smart QR</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --card-bg: #ffffff;
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --success-bg: #ecfdf5;
            --success-text: #065f46;
            --success-border: #a7f3d0;
            --error-bg: #fef2f2;
            --error-text: #991b1b;
            --error-border: #fca5a5;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Segoe UI', system-ui, sans-serif; 
        }

        body { 
            background: var(--bg-gradient); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            padding: 16px; 
        }

        .container { 
            background: var(--card-bg); 
            max-width: 450px; 
            width: 100%; 
            padding: 30px 20px; 
            border-radius: 28px; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4); 
            text-align: center;
        }

        /* Desain Header */
        .icon-wrapper {
            font-size: 36px;
            margin-bottom: 12px;
            display: inline-block;
            background: #f1f5f9;
            width: 70px;
            height: 70px;
            line-height: 70px;
            border-radius: 50%;
        }

        h2 { 
            color: var(--text-main); 
            margin-bottom: 8px; 
            font-size: 22px; 
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .subtitle { 
            color: var(--text-muted); 
            font-size: 14px; 
            margin-bottom: 25px; 
            line-height: 1.5;
            padding: 0 10px;
        }

        /* Area Kamera Scanner */
        #reader { 
            width: 100% !important; 
            border-radius: 20px !important; 
            overflow: hidden !important; 
            border: 2px solid #e2e8f0 !important; 
            background: #f8fafc !important;
            box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.04) !important;
        }

        /* Video / Kamera Bagian Dalam */
        #reader video {
            border-radius: 16px !important;
            object-fit: cover !important;
        }

        /* ==========================================
           🌟 STRUKTUR UTAMA KONTROL KAMERA (FIXED PRESISI)
           ========================================== */
        
        /* Wadah Pembungkus Pilihan Kamera & Tombol Start/Stop */
        #reader__dashboard {
            padding: 20px 15px !important;
            background: #ffffff !important;
        }

        #reader__dashboard_section_csr {
            display: flex !important;
            flex-direction: column !important;
            align-items: center !important;
            justify-content: center !important;
            width: 100% !important;
            margin: 0 auto !important;
            float: none !important;
        }

        /* Merapikan Teks Label Judul "Select Camera" */
        #reader div[style*="text-align: left"],
        #reader__dashboard_section_csr div {
            text-align: center !important;
            font-size: 13px !important;
            font-weight: 700 !important;
            color: var(--text-muted) !important;
            margin: 5px 0 10px 0 !important;
            text-transform: uppercase !important;
            letter-spacing: 0.8px !important;
            width: 100% !important;
            float: none !important;
        }

        /* Merombak Total Dropdown Select Camera (Kebal Perubahan Klik) */
        #reader__camera_selection {
            display: block !important;
            width: 100% !important;
            max-width: 290px !important;
            margin: 0 auto 15px auto !important;
            padding: 12px 40px 12px 16px !important;
            font-size: 14px !important;
            font-weight: 700 !important;
            font-family: inherit !important;
            color: #1e293b !important;
            background-color: #f1f5f9 !important;
            
            /* Custom Ikon Panah Modern Minimalis */
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%234f46e5' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>") !important;
            background-repeat: no-repeat !important;
            background-position: right 16px center !important;
            background-size: 16px !important;
            
            border: 2px solid #e2e8f0 !important;
            border-radius: 14px !important;
            outline: none !important;
            transition: all 0.2s ease !important;
            -webkit-appearance: none !important;
            -moz-appearance: none !important;
            appearance: none !important;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.02) !important;
            float: none !important;
        }

        #reader__camera_selection:focus {
            border-color: var(--primary) !important;
            background-color: #ffffff !important;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.12) !important;
        }

        /* Merapikan Seluruh Tombol Utama (Start / Stop Scanning) */
        #reader button { 
            display: inline-block !important;
            width: 100% !important;
            max-width: 290px !important;
            background: var(--primary) !important; 
            color: white !important; 
            border: none !important; 
            padding: 14px 24px !important; 
            font-size: 15px !important; 
            font-weight: 700 !important; 
            border-radius: 14px !important; 
            cursor: pointer !important; 
            margin: 5px auto !important;
            transition: all 0.2s ease !important;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2) !important;
            float: none !important;
        }

        #reader button:hover { 
            background: var(--primary-hover) !important; 
            transform: translateY(-1px);
        }

        /* Tombol Stop Scanning Warna Merah Crimson */
        #reader button[id*="stop"] {
            background: #ef4444 !important;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.2) !important;
        }
        #reader button[id*="stop"]:hover {
            background: #dc2626 !important;
        }

        /* Tautan Ganti Mode "Scan an Image File" */
        #reader__dashboard_section_swaplink {
            display: block !important;
            margin: 12px auto 0 auto !important;
            color: var(--text-muted) !important;
            font-weight: 600 !important;
            text-decoration: none !important;
            font-size: 13px !important;
            opacity: 0.8;
            width: fit-content !important;
            float: none !important;
        }
        #reader__dashboard_section_swaplink:hover {
            color: var(--primary) !important;
            opacity: 1;
        }

        /* Box Status Notifikasi Berhasil / Gagal */
        .result-box { 
            margin-top: 20px; 
            display: none; 
            animation: slideUp 0.4s ease forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .alert-success { 
            padding: 25px 20px; 
            border-radius: 20px; 
            background-color: var(--success-bg); 
            color: var(--success-text); 
            border: 1px solid var(--success-border);
        }

        .success-icon { font-size: 40px; margin-bottom: 8px; display: block; }
        .student-name { font-size: 22px; font-weight: 800; color: #0f172a; margin: 10px 0; display: block; letter-spacing: -0.5px; }
        .btn-next { margin-top: 18px; padding: 14px 24px; background: var(--primary); color: white; border: none; border-radius: 14px; cursor: pointer; font-weight: 700; font-size: 15px; width: 100%; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.25); }
        .btn-next:hover { background: var(--primary-hover); }
        .alert-error { padding: 20px; background-color: var(--error-bg); color: var(--error-text); border: 1px solid var(--error-border); border-radius: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="icon-wrapper">📷</div>
    <h2>Presensi QR Code</h2>
    <p class="subtitle">Arahkan kartu QR siswa ke posisi tengah kamera untuk merekam kehadiran otomatis.</p>
    
    <div id="reader"></div>
    
    <div id="resultContainer" class="result-box"></div>
</div>

<script>
    // ⚠️ PASTIKAN BERISI URL WEB APP EXEC SCRIPT ANDA
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyMWpvcU8HLBGWieswM9hjXWYjYhbDELRtOWtjGnKmhn1ZHO10QcMenpw-hOXY5Wrme1A/exec"; 

    function onScanSuccess(decodedText, decodedResult) {
        html5QrcodeScanner.clear();
        
        var elementHasil = document.getElementById('resultContainer');
        elementHasil.style.display = "block";
        elementHasil.innerHTML = `
            <div style="padding: 15px; color: var(--text-muted); font-weight: 600;">
                ⏳ Memproses verifikasi data, mohon tunggu...
            </div>
        `;

        fetch(WEB_APP_URL, {
            method: "POST",
            body: JSON.stringify({ nis: decodedText }),
            headers: { "Content-Type": "text/plain;charset=utf-8" }
        })
        .then(response => response.json())
        .then(data => {
            if (data.result === "success") {
                elementHasil.innerHTML = `
                    <div class="alert-success">
                        <span class="success-icon">🎉</span>
                        <h3 style="font-weight: 700; font-size: 18px;">Scan Berhasil!</h3>
                        <span class="student-name">${data.nama}</span>
                        <p style="font-size: 14px; opacity: 0.9;">Data log kehadiran siswa telah sukses disimpan.</p>
                        <button class="btn-next" onclick="restartScanner()">🔄 Scan Berikutnya</button>
                    </div>
                `;
            } else {
                elementHasil.innerHTML = `
                    <div class="alert-error">
                        <span style="font-size: 36px; display:block; margin-bottom:8px;">❌</span>
                        <h3 style="font-weight: 700; margin-bottom: 4px;">Gagal Mengenali Kartu</h3>
                        <p style="font-size: 14px;">${data.message}</p>
                        <button class="btn-next" style="background:#ef4444;" onclick="restartScanner()">Coba Lagi</button>
                    </div>
                `;
            }
        })
        .catch(error => {
            console.error(error);
            elementHasil.innerHTML = `
                <div class="alert-error">
                    <span style="font-size: 36px; display:block; margin-bottom:8px;">⚠️</span>
                    <h3 style="font-weight: 700; margin-bottom: 4px;">Gangguan Jaringan</h3>
                    <p style="font-size: 14px;">Gagal terhubung ke database server Sheets.</p>
                    <button class="btn-next" style="background:#f59e0b;" onclick="restartScanner()">Ulangi</button>
                </div>
            `;
        });
    }

    var html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
    html5QrcodeScanner.render(onScanSuccess);

    function restartScanner() {
        location.reload();
    }
</script>

</body>
</html>
