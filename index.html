<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Absensi Siswa</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }
        #reader { width: 100%; max-width: 500px; margin: 0 auto; }
        #result { margin-top: 20px; font-size: 1.2em; font-weight: bold; color: green; }
    </style>
</head>
<body>

    <h1>SCAN ABSENSI SISWA</h1>
    <div id="reader"></div>
    <div id="result"></div>

    <script>
        // GANTI URL INI dengan URL Google Apps Script Anda dari Langkah 3
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxnxbGRGF4gTfpDAV-3o8XYzRALh6SBCMC3sbYe-UrjoOrcAGPZb1rxsuvp5LIaf3q6gA/exec"; 

        function onScanSuccess(decodedText, decodedResult) {
            // Hentikan scanner sementara agar tidak double scan
            html5QrcodeScanner.clear();
            
            document.getElementById('result').innerText = "Memproses NIS: " + decodedText + "...";

            // Kirim data ke Google Sheets
         // Ganti bagian fetch lama dengan ini agar tidak terblokir keamanan browser
fetch(WEB_APP_URL, {
    method: "POST",
    mode: "no-cors", // <--- Tambahkan baris ini untuk melewati penguncian CORS
    body: JSON.stringify({ nis: decodedText }),
    headers: { "Content-Type": "text/plain;charset=utf-8" }
})
            .then(response => response.json())
            .then(data => {
                if (data.status === "success") {
                    document.getElementById('result').innerHTML = `✅ Berhasil! <br> Nama: ${data.nama} <br> Status: HADIR`;
                } else {
                    document.getElementById('result').innerText = "❌ Gagal mencatat absensi.";
                }
                // Jalankan kembali scanner setelah 3 detik
                setTimeout(restartScanner, 3000);
            })
            .catch(error => {
                console.error("Error:", error);
                document.getElementById('result').innerText = "❌ Terjadi kesalahan jaringan.";
                setTimeout(restartScanner, 3000);
            });
        }

        function restartScanner() {
            document.getElementById('result').innerText = "";
            html5QrcodeScanner.render(onScanSuccess);
        }

        // Jalankan Scanner saat halaman dimuat
        var html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>
