<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Absensi Siswa</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; background-color: #f4f6f9; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); }
        #reader { width: 100%; background: #333; }
        #status { margin-top: 20px; font-weight: bold; font-size: 1.2em; }
    </style>
</head>
<body>

<div class="container">
    <h2>SCAN ABSENSI SISWA</h2>
    <div id="reader"></div>
    <div id="status">Mengaktifkan Kamera...</div>
</div>

<script>
    // ⚠️ GANTI DENGAN URL APPS SCRIPT BARU HASIL LANGKAH 2
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzfM2U27ZwceKOJUrRC3eEip_4gu7pgv0o9ASkpJn_n0aj5z841a3P8ZCnqzd4hbNSdTA/exec"; 

    function onScanSuccess(decodedText, decodedResult) {
        // Matikan scanner sebentar agar tidak men-scan berulang-ulang dalam satu detik
        html5QrcodeScanner.clear();
        document.getElementById('status').innerHTML = "⏳ Memproses data, mohon tunggu...";

        // Kirim data ke Google Sheets
        fetch(WEB_APP_URL, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify({ nis: decodedText }),
            headers: { "Content-Type": "text/plain;charset=utf-8" }
        })
        .then(() => {
            document.getElementById('status').innerHTML = `<span style="color:green;">✅ Berhasil Dikirim! (NIS: ${decodedText})</span><br><br><button onclick="location.reload()">Scan Lagi</button>`;
        })
        .catch(error => {
            console.error(error);
            document.getElementById('status').innerHTML = '<span style="color:red;">❌ Terjadi kesalahan jaringan.</span><br><br><button onclick="location.reload()">Coba Lagi</button>';
        });
    }

    function onScanFailure(error) {
        // Abaikan kegagalan frame kamera biasa
    }

    let html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: {width: 250, height: 250} }, false);
    html5QrcodeScanner.render(onScanSuccess, onScanFailure);
</script>

</body>
</html>
